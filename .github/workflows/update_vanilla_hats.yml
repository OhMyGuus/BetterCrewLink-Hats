name: Update vanilla hats

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download DepotDownloader
        run: |
          curl -fsSL https://github.com/SteamRE/DepotDownloader/releases/latest/download/DepotDownloader-linux-x64.zip \
            -o /tmp/dd.zip
          unzip -q /tmp/dd.zip -d /tmp/dd
          chmod +x /tmp/dd/DepotDownloader

      - name: Download catalog.json
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          /tmp/dd/DepotDownloader \
            -app 945360 -depot 945361 \
            -username "$STEAM_USER" \
            -password "$STEAM_PASS" \
            -dir /tmp/among-us \
            -filelist .github/depotdownloader-catalog-only.txt

      - name: Check if catalog changed
        id: version
        run: |
          HASH=$(sha256sum "/tmp/among-us/Among Us_Data/StreamingAssets/aa/catalog.json" | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

          LAST=$(cat .steamversion 2>/dev/null || echo "")
          if [ "$HASH" = "$LAST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "catalog.json unchanged ($HASH), nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "catalog.json changed (was: ${LAST:-none}, now: $HASH)"
          fi

      - name: Download Among Us bundles
        if: steps.version.outputs.skip == 'false'
        env:
          STEAM_USER: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASS: ${{ secrets.STEAM_PASSWORD }}
        run: |
          /tmp/dd/DepotDownloader \
            -app 945360 -depot 945361 \
            -username "$STEAM_USER" \
            -password "$STEAM_PASS" \
            -dir /tmp/among-us \
            -filelist .github/depotdownloader-filelist.txt

      - name: Download hat-exporter
        if: steps.version.outputs.skip == 'false'
        run: |
          curl -fsSL https://github.com/OhMyGuus/BetterCrewlink-HatTools/releases/latest/download/hat-exporter-linux-x64 \
            -o /tmp/hat-exporter
          chmod +x /tmp/hat-exporter

      - name: Run hat-exporter
        if: steps.version.outputs.skip == 'false'
        run: |
          /tmp/hat-exporter \
            --bundle-dir "/tmp/among-us/Among Us_Data/StreamingAssets/aa/Steam/StandaloneWindows" \
            --output-dir .

      - name: Update version file
        if: steps.version.outputs.skip == 'false'
        run: |
          echo "${{ steps.version.outputs.hash }}" > .steamversion
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
        id: meta

      - name: Create pull request
        if: steps.version.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Updated hats"
          branch: "update-hats-${{ steps.meta.outputs.date }}"
          commit-message: "Updated hats"
          body: |
            Automated update: Among Us shipped new cosmetics.

            Re-exported all NONE hat sprites and JSON using [hat-exporter](https://github.com/OhMyGuus/BetterCrewlink-HatTools).
          labels: automated
          delete-branch: true
